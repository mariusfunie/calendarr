services:
  calendarr:
    image: calendarr
    container_name: calendarr
    ports:
      - "8484:3000"
    volumes:
      - /mnt/Storage1/ARR/calendarr/data:/app/data
    environment:
      - NODE_ENV=production
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/settings"]
      interval: 30s
      timeout: 10s
      retries: 3
